name: ci

on:
  pull_request:
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'bin/**'
      - 'scripts/**'
      - 'fixtures/**'
      - 'package.json'
      - 'packages/**'
      - '.github/workflows/**'
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --release
      - name: cargo test
        run: cargo test --release
      - name: launcher resolves binary
        # `wash mcp` reads MCP frames from stdin until EOF and exits 0 cleanly.
        # The integration test (`tests/mcp_stdio.rs`) drives the full protocol;
        # this is just a launcher-resolution smoke (asserts the Node-side bin/wash.mjs
        # finds and execs the Rust binary).
        run: |
          node bin/wash.mjs --version
          node bin/wash.mjs mcp <<< ''

  launcher-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: validate package layout
        run: |
          node -e "const p=require('./package.json');if(!p.bin?.wash)throw new Error('missing bin.wash');if(!p.optionalDependencies)throw new Error('missing optionalDependencies');console.log('wrapper ok')"
          for d in packages/wash-*; do
            node -e "const p=require('./$d/package.json');if(!p.os||!p.cpu)throw new Error('${d}: missing os/cpu');console.log('${d}: ok')"
          done
